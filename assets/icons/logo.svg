<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#4FACFE" />
      <stop offset="100%" stop-color="#00C6FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Squircle -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bgGrad)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="4"/>
  <!-- Glowing Monogram P -->
  <path d="M 170 120 L 280 120 C 340 120, 380 155, 380 215 C 380 275, 340 310, 280 310 L 230 310 L 230 390 L 170 390 Z M 230 175 L 230 255 L 275 255 C 305 255, 325 240, 325 215 C 325 190, 305 175, 275 175 Z" fill="url(#pGrad)" filter="url(#glow)"/>
